<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مسح الذاكرة المؤقتة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f0f0;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #c0392b;
        }
        .success {
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🗑️ مسح الذاكرة المؤقتة</h1>
        <p>إذا واجهت مشاكل، اضغط على الزر لمسح البيانات المحفوظة</p>
        <button onclick="clearAll()">مسح كل البيانات</button>
        <button onclick="window.location.href='/'">العودة للصفحة الرئيسية</button>
        <p id="message"></p>
    </div>

    <script>
        function clearAll() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('message').innerHTML = '<span class="success">✅ تم مسح جميع البيانات المحفوظة!<br>يمكنك الآن تسجيل الدخول من جديد</span>';
        }
    </script>
</body>
</html>
